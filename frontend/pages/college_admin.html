<script>
// ============================================================
// 学院管理员 - 页面主逻辑
// ============================================================

let currentPage = 'dashboard';
let myCollegeId = null;

document.getElementById('sidebarNav').addEventListener('click', function(e) {
    e.preventDefault();
    const link = e.target.closest('a');
    if (!link) return;
    const page = link.dataset.page;
    if (!page) return;
    document.querySelectorAll('#sidebarNav .nav-link').forEach(el => el.classList.remove('active'));
    link.classList.add('active');
    currentPage = page;
    renderPage(page);
});

function renderPage(page) {
    const container = document.getElementById('mainContent');
    switch (page) {
        case 'dashboard':  renderDashboard(container); break;
        case 'teachers':   renderTeacherList(container); break;
        case 'students':   renderStudentList(container); break;
        case 'courses':    renderCourseList(container); break;
        case 'selections': renderSelectionList(container); break;
        case 'lottery':    renderLotteryPage(container); break;
        case 'grades':     renderGradeList(container); break;
    }
}

async function init() {
    // TODO: 检查登录状态 api.auth.currentUser()，获取 college_id
    // TODO: 如果不是 college_admin 角色，跳转回 /
    renderPage('dashboard');
}
init();

                    <li>查看本学院课程成绩</li>
                </ul>
            </div>
        </div>
    `;
}

    // TODO: 加载本学院课程到下拉框
