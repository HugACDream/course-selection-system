// ============================================================
// 学生 - 页面主逻辑
// ============================================================

let currentPage = 'dashboard';
let myStudentId = null;
let currentDetailCourseId = null;

document.getElementById('sidebarNav').addEventListener('click', function(e) {
    e.preventDefault();
    const link = e.target.closest('a');
    if (!link) return;
    const page = link.dataset.page;
    if (!page) return;
    document.querySelectorAll('#sidebarNav .nav-link').forEach(el => el.classList.remove('active'));
    link.classList.add('active');
    currentPage = page;
    renderPage(page);
});

function renderPage(page) {
    const container = document.getElementById('mainContent');
    switch (page) {
        case 'dashboard':       renderDashboard(container); break;
        case 'profile':         renderProfile(container); break;
        case 'course-selection':renderCourseSelection(container); break;
        case 'my-selections':   renderMySelections(container); break;
        case 'my-grades':       renderMyGrades(container); break;
        case 'messages':        renderMessages(container); break;
    }
}

    // TODO: 检查登录状态 api.auth.currentUser()
