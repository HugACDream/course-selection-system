<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师 - 选课管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- ====== 侧边栏 ====== -->
        <nav class="col-md-2 d-md-block sidebar">
            <div class="text-center mb-4">
                <h5><i class="bi bi-building"></i> 选课管理系统</h5>
                <small class="text-muted">教师</small>
                <small class="d-block text-muted" id="myName">--</small>
            </div>
            <ul class="nav flex-column" id="sidebarNav">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-page="dashboard">
                        <i class="bi bi-speedometer2"></i> 控制台
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="my-courses">
                        <i class="bi bi-book"></i> 我的课程
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="confirmed-students">
                        <i class="bi bi-person-check"></i> 中签学生
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="grades">
                        <i class="bi bi-pencil-square"></i> 成绩录入
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="grade-stats">
                        <i class="bi bi-bar-chart"></i> 成绩统计
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="messages">
                        <i class="bi bi-envelope"></i> 消息
                        <span class="badge bg-danger ms-1 d-none" id="unreadBadge">0</span>
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-danger" href="#" id="btnLogout">
                        <i class="bi bi-box-arrow-left"></i> 退出登录
                    </a>
                </li>
            </ul>
            <div class="mt-auto px-3 py-2">
                <small>当前用户: <span id="currentUserName">--</span></small>
            </div>
        </nav>

        <!-- ====== 主内容区 ====== -->
        <main class="col-md-10 main-content" id="mainContent">
            <!-- 动态渲染 -->
        </main>
    </div>
</div>

<!-- ====== 通用模态框 ====== -->
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="formModalTitle">编辑</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="formModalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btnFormSave">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
// ============================================================
// 教师 - 页面主逻辑
// ============================================================

let currentPage = 'dashboard';
let myTeacherId = null;

document.getElementById('sidebarNav').addEventListener('click', function(e) {
    e.preventDefault();
    const link = e.target.closest('a');
    if (!link) return;
    const page = link.dataset.page;
    if (!page) return;
    document.querySelectorAll('#sidebarNav .nav-link').forEach(el => el.classList.remove('active'));
    link.classList.add('active');
    currentPage = page;
    renderPage(page);
});

document.getElementById('btnLogout').addEventListener('click', async function(e) {
    e.preventDefault();
    await api.auth.logout();
    window.location.href = '/';
});

function renderPage(page) {
    const container = document.getElementById('mainContent');
    switch (page) {
        case 'dashboard':          renderDashboard(container); break;
        case 'my-courses':         renderMyCourses(container); break;
        case 'confirmed-students': renderConfirmedStudents(container); break;
        case 'grades':             renderGradeEntry(container); break;
        case 'grade-stats':        renderGradeStats(container); break;
        case 'messages':           renderMessages(container); break;
    }
}

function showAlert(msg) { alert(msg); }

async function init() {
    const res = await api.auth.currentUser();
    if (!res.success || res.user.role !== 'teacher') {
        window.location.href = '/';
        return;
    }
    myTeacherId = res.user.id;
    document.getElementById('currentUserName').textContent = res.user.name || res.user.username;
    document.getElementById('myName').textContent = res.user.name || '';
    renderPage('dashboard');
}
init();


// ============================================================
// 控制台
// ============================================================

async function renderDashboard(container) {
    container.innerHTML = `
        <h4 class="mb-4"><i class="bi bi-speedometer2"></i> 教师控制台</h4>
        <div class="row g-3 mb-4" id="dashboardStats">
            <div class="col-md-4"><div class="card text-bg-primary"><div class="card-body text-center"><h5 id="statCourseCount">--</h5><p>我的课程</p></div></div></div>
            <div class="col-md-4"><div class="card text-bg-success"><div class="card-body text-center"><h5 id="statStudentCount">--</h5><p>中签学生总数</p></div></div></div>
            <div class="col-md-4"><div class="card text-bg-info"><div class="card-body text-center"><h5 id="statUnreadCount">--</h5><p>未读消息</p></div></div></div>
        </div>
        <div class="card"><div class="card-body">
            <h5>教师功能</h5>
            <ul>
                <li>管理课程信息：输入课程介绍、上传课件、设置先修课程</li>
                <li>查看中签学生名单</li>
                <li>录入学生成绩，生成成绩统计表</li>
                <li>与选课学生消息互动</li>
            </ul>
        </div></div>
    `;
    const cRes = await api.teacher.listMyCourses();
    if (cRes.success) {
        document.getElementById('statCourseCount').textContent = cRes.data.length;
        let totalStudents = 0;
        for (const c of cRes.data) {
            const sRes = await api.teacher.getConfirmedStudents(c.id);
            if (sRes.success) totalStudents += sRes.data.length;
        }
        document.getElementById('statStudentCount').textContent = totalStudents;
    }
    const mRes = await api.teacher.listReceivedMessages({ page: 1, page_size: 1 });
    if (mRes.success) document.getElementById('statUnreadCount').textContent = mRes.data.total;
}


// ============================================================
// 我的课程（需求5: 课程信息管理）
// ============================================================

async function renderMyCourses(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-book"></i> 我的课程</h4>
        <div class="row g-3" id="courseCards"></div>
    `;
    const res = await api.teacher.listMyCourses();
    const cards = document.getElementById('courseCards');
    if (!res.success || res.data.length === 0) {
        cards.innerHTML = '<div class="col-12 text-muted">暂无课程</div>';
        return;
    }
    cards.innerHTML = res.data.map(c => `
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">${c.name}</h5>
                    <p class="card-text text-muted small">${c.description || '暂无描述'}</p>
                    <p class="mb-1"><small>学分: ${c.credits} | 限选: ${c.max_students}人 | 已选: ${c.selection_count || 0}人</small></p>
                    <p class="mb-2"><small>先修课程: ${Array.isArray(c.prerequisites) && c.prerequisites.length > 0 ? c.prerequisites.join(',') : '无'}</small></p>
                    <button class="btn btn-sm btn-outline-primary me-1 btn-edit-course" data-course='${JSON.stringify(c).replace(/"/g, '&quot;')}'>编辑</button>
                    <button class="btn btn-sm btn-outline-success" onclick="uploadMaterialPrompt(${c.id})">上传课件</button>
                </div>
            </div>
        </div>
    `).join('');

    // 事件委托: 编辑课程按钮
    document.getElementById('courseCards').addEventListener('click', function(e) {
        const btn = e.target.closest('.btn-edit-course');
        if (!btn) return;
        const course = JSON.parse(btn.dataset.course);
        showEditCourseForm(course);
    });
}

function showEditCourseForm(course) {
    const id = course.id;
    const name = course.name;
    const description = course.description || '';
    const prereqText = Array.isArray(course.prerequisites) ? course.prerequisites.join(',') : '';
    document.getElementById('formModalTitle').textContent = '编辑课程 - ' + name;
    document.getElementById('formModalBody').innerHTML = `
        <div class="mb-3"><label class="form-label">课程描述</label><textarea class="form-control" id="f_description">${description}</textarea></div>
        <div class="mb-3"><label class="form-label">学分</label><input class="form-control" type="number" step="0.5" id="f_credits" value="${course.credits}"></div>
        <div class="mb-3"><label class="form-label">限选人数</label><input class="form-control" type="number" id="f_max_students" value="${course.max_students}"></div>
        <div class="mb-3"><label class="form-label">先修课程名称（逗号分隔）</label><input class="form-control" id="f_prerequisites" value="${prereqText}"></div>
        <div class="mb-3"><label class="form-label">课程介绍</label><textarea class="form-control" id="f_syllabus" rows="4">${course.syllabus || ''}</textarea></div>
    `;
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    document.getElementById('btnFormSave').onclick = async function() {
        const prereqVal = document.getElementById('f_prerequisites').value.trim();
        const prereqIds = prereqVal ? prereqVal.split(',').map(s => s.trim()).filter(s => s) : [];
        const data = {
            description: document.getElementById('f_description').value.trim(),
            credits: parseFloat(document.getElementById('f_credits').value) || 0,
            max_students: parseInt(document.getElementById('f_max_students').value) || 30,
            prerequisites: prereqIds,
            syllabus: document.getElementById('f_syllabus').value.trim(),
        };
        const result = await api.teacher.updateCourse(id, data);
        if (result.success) { modal.hide(); renderMyCourses(document.getElementById('mainContent')); }
        showAlert(result.message);
    };
    modal.show();
}

function uploadMaterialPrompt(courseId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async function() {
        if (!input.files[0]) return;
        const formData = new FormData();
        formData.append('file', input.files[0]);
        const res = await api.teacher.uploadMaterial(courseId, formData);
        showAlert(res.message);
    };
    input.click();
}


// ============================================================
// 中签学生（需求6: 查询中签学生名单）
// ============================================================

let confirmedStudentsCourseId = null;

async function renderConfirmedStudents(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-person-check"></i> 中签学生查询</h4>
        <div class="card"><div class="card-body">
            <div class="mb-3">
                <label class="form-label">选择课程：</label>
                <select class="form-select" id="courseSelectForStudents" style="width:300px;">
                    <option value="">-- 请选择课程 --</option>
                </select>
            </div>
            <table class="table table-hover">
                <thead class="table-light"><tr><th>学号</th><th>姓名</th><th>邮箱</th><th>电话</th></tr></thead>
                <tbody id="confirmedStudentsBody">
                    <tr><td colspan="4" class="text-center text-muted">请先选择课程</td></tr>
                </tbody>
            </table>
        </div></div>
    `;
    const cRes = await api.teacher.listMyCourses();
    if (cRes.success) {
        const sel = document.getElementById('courseSelectForStudents');
        cRes.data.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    }
    document.getElementById('courseSelectForStudents').addEventListener('change', async function() {
        const courseId = parseInt(this.value);
        if (!courseId) return;
        const res = await api.teacher.getConfirmedStudents(courseId);
        const tbody = document.getElementById('confirmedStudentsBody');
        if (!res.success || res.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">暂无中签学生</td></tr>';
        } else {
            tbody.innerHTML = res.data.map(s => `
                <tr><td>${s.username}</td><td>${s.name}</td><td>${s.email || '-'}</td><td>${s.phone || '-'}</td></tr>
            `).join('');
        }
    });
}


// ============================================================
// 成绩录入（需求6: 录入课程成绩）
// ============================================================

async function renderGradeEntry(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-pencil-square"></i> 成绩录入</h4>
        <div class="card"><div class="card-body">
            <div class="mb-3">
                <label class="form-label">选择课程：</label>
                <select class="form-select" id="courseSelectForGrades" style="width:300px;">
                    <option value="">-- 请选择课程 --</option>
                </select>
            </div>
            <div id="gradeEntryForm" style="display:none;">
                <table class="table" id="gradeEntryTable">
                    <thead class="table-light"><tr><th>学号</th><th>姓名</th><th>分数</th><th>绩点</th></tr></thead>
                    <tbody id="gradeEntryBody"></tbody>
                </table>
                <button class="btn btn-primary" id="btnSaveGrades"><i class="bi bi-check-lg"></i> 保存成绩</button>
            </div>
        </div></div>
    `;

    const cRes = await api.teacher.listMyCourses();
    if (cRes.success) {
        const sel = document.getElementById('courseSelectForGrades');
        cRes.data.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    }

    document.getElementById('courseSelectForGrades').addEventListener('change', async function() {
        const courseId = parseInt(this.value);
        if (!courseId) { document.getElementById('gradeEntryForm').style.display = 'none'; return; }

        const [sRes, gRes] = await Promise.all([
            api.teacher.getConfirmedStudents(courseId),
            api.teacher.listCourseGrades(courseId)
        ]);
        const existingGrades = {};
        if (gRes.success) gRes.data.forEach(g => { existingGrades[g.student_id] = g.score; });

        const tbody = document.getElementById('gradeEntryBody');
        if (!sRes.success || sRes.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">暂无中签学生</td></tr>';
        } else {
            tbody.innerHTML = sRes.data.map(s => `
                <tr>
                    <td>${s.username}</td><td>${s.name}</td>
                    <td><input class="form-control form-control-sm score-input" type="number" min="0" max="100" data-student-id="${s.id}" value="${existingGrades[s.id] != null ? existingGrades[s.id] : ''}"></td>
                    <td class="gp-cell" id="gp_${s.id}">${existingGrades[s.id] != null ? calcGPA(existingGrades[s.id]).toFixed(1) : '-'}</td>
                </tr>
            `).join('');

            // 实时计算绩点
            document.querySelectorAll('.score-input').forEach(input => {
                input.addEventListener('input', function() {
                    const score = parseFloat(this.value);
                    const gpCell = document.getElementById('gp_' + this.dataset.studentId);
                    if (!isNaN(score) && score >= 0 && score <= 100) {
                        gpCell.textContent = calcGPA(score).toFixed(1);
                    } else {
                        gpCell.textContent = '-';
                    }
                });
            });
        }
        document.getElementById('gradeEntryForm').style.display = 'block';
    });

    document.getElementById('btnSaveGrades').addEventListener('click', async function() {
        const courseId = parseInt(document.getElementById('courseSelectForGrades').value);
        const grades = [];
        document.querySelectorAll('.score-input').forEach(input => {
            const score = parseFloat(input.value);
            if (!isNaN(score)) {
                grades.push({ student_id: parseInt(input.dataset.studentId), score: score });
            }
        });
        if (grades.length === 0) { showAlert('请至少输入一个成绩'); return; }
        const res = await api.teacher.saveGrades(courseId, { grades });
        showAlert(res.message);
    });
}

function calcGPA(score) {
    if (score >= 90) return 4.0;
    if (score >= 80) return 3.0;
    if (score >= 70) return 2.0;
    if (score >= 60) return 1.0;
    return 0.0;
}


// ============================================================
// 成绩统计（需求6: 生成成绩统计表）
// ============================================================

let gradeChart = null;

async function renderGradeStats(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-bar-chart"></i> 成绩统计</h4>
        <div class="card"><div class="card-body">
            <div class="mb-3">
                <label class="form-label">选择课程：</label>
                <select class="form-select" id="courseSelectForStats" style="width:300px;">
                    <option value="">-- 请选择课程 --</option>
                </select>
            </div>
            <div id="gradeStatsResult" style="display:none;">
                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-bordered">
                            <thead class="table-light"><tr><th>分数段</th><th>人数</th><th>占比</th></tr></thead>
                            <tbody id="gradeStatsBody"></tbody>
                        </table>
                        <div id="statsSummary" class="mt-2"></div>
                    </div>
                    <div class="col-md-6">
                        <div style="height:350px;"><canvas id="gradeDistChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div></div>
    `;

    const cRes = await api.teacher.listMyCourses();
    if (cRes.success) {
        const sel = document.getElementById('courseSelectForStats');
        cRes.data.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    }

    document.getElementById('courseSelectForStats').addEventListener('change', async function() {
        const courseId = parseInt(this.value);
        if (!courseId) { document.getElementById('gradeStatsResult').style.display = 'none'; return; }
        const res = await api.teacher.getGradeStatistics(courseId);
        if (!res.success) { showAlert('加载统计失败'); return; }
        const stats = res.data;
        document.getElementById('gradeStatsResult').style.display = 'block';

        // 分数段分布
        const ranges = [
            { label: '90-100 (优秀)', key: 'range_90_100' },
            { label: '80-89 (良好)', key: 'range_80_89' },
            { label: '70-79 (中等)', key: 'range_70_79' },
            { label: '60-69 (及格)', key: 'range_60_69' },
            { label: '0-59 (不及格)', key: 'range_0_59' },
        ];
        const total = stats.total_count || 0;
        document.getElementById('gradeStatsBody').innerHTML = ranges.map(r => {
            const count = stats[r.key] || 0;
            const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0.0';
            return `<tr><td>${r.label}</td><td>${count}</td><td>${pct}%</td></tr>`;
        }).join('');
        document.getElementById('gradeStatsBody').innerHTML += `
            <tr class="table-secondary"><td><strong>合计</strong></td><td><strong>${total}</strong></td><td>100%</td></tr>
        `;

        document.getElementById('statsSummary').innerHTML = `
            <div class="alert alert-info">
                <strong>平均分：</strong>${stats.avg_score != null ? stats.avg_score.toFixed(1) : '-'} &nbsp;
                <strong>最高分：</strong>${stats.max_score != null ? stats.max_score : '-'} &nbsp;
                <strong>最低分：</strong>${stats.min_score != null ? stats.min_score : '-'} &nbsp;
                <strong>及格率：</strong>${stats.pass_rate != null ? (stats.pass_rate * 100).toFixed(1) + '%' : '-'}
            </div>
        `;

        // 柱状图
        const ctx = document.getElementById('gradeDistChart').getContext('2d');
        if (gradeChart) gradeChart.destroy();
        gradeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ranges.map(r => r.label),
                datasets: [{
                    label: '人数',
                    data: ranges.map(r => stats[r.key] || 0),
                    backgroundColor: ['#198754', '#0d6efd', '#ffc107', '#fd7e14', '#dc3545'],
                }]
            },
            options: { responsive: true, maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                plugins: { legend: { display: false } }
            }
        });
    });
}


// ============================================================
// 消息（需求7: 对学生发送消息留言）
// ============================================================

async function renderMessages(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-envelope"></i> 消息</h4>
        <div class="card"><div class="card-body">
            <ul class="nav nav-tabs" id="messageTabs">
                <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#msgInbox">收件箱</a></li>
                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#msgOutbox">发件箱</a></li>
                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#msgSend">发送消息</a></li>
            </ul>
            <div class="tab-content mt-3">
                <div class="tab-pane fade show active" id="msgInbox">
                    <div id="inboxList"><p class="text-muted">加载中...</p></div>
                    <nav id="inboxPagination"></nav>
                </div>
                <div class="tab-pane fade" id="msgOutbox">
                    <div id="outboxList"><p class="text-muted">加载中...</p></div>
                    <nav id="outboxPagination"></nav>
                </div>
                <div class="tab-pane fade" id="msgSend">
                    <form id="sendMessageForm">
                        <div class="mb-3">
                            <label class="form-label">选择课程</label>
                            <select class="form-select" id="msgCourseSelect">
                                <option value="">-- 选择课程 --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">选择学生</label>
                            <select class="form-select" id="msgStudentSelect">
                                <option value="">-- 先选择课程 --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">消息内容</label>
                            <textarea class="form-control" id="msgContent" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> 发送</button>
                    </form>
                </div>
            </div>
        </div></div>
    `;

    // 加载课程列表
    const cRes = await api.teacher.listMyCourses();
    if (cRes.success) {
        const sel = document.getElementById('msgCourseSelect');
        cRes.data.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    }

    // 课程变化时加载中签学生
    document.getElementById('msgCourseSelect').addEventListener('change', async function() {
        const courseId = parseInt(this.value);
        const studentSel = document.getElementById('msgStudentSelect');
        if (!courseId) { studentSel.innerHTML = '<option value="">-- 先选择课程 --</option>'; return; }
        const sRes = await api.teacher.getConfirmedStudents(courseId);
        studentSel.innerHTML = '<option value="">-- 选择学生 --</option>';
        if (sRes.success) {
            sRes.data.forEach(s => { studentSel.innerHTML += `<option value="${s.id}">${s.name} (${s.username})</option>`; });
        }
    });

    // 发送消息
    document.getElementById('sendMessageForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const receiverId = parseInt(document.getElementById('msgStudentSelect').value);
        const courseId = parseInt(document.getElementById('msgCourseSelect').value) || null;
        const content = document.getElementById('msgContent').value.trim();
        if (!receiverId || !content) { showAlert('请选择学生并输入消息内容'); return; }
        const res = await api.teacher.sendMessage({ receiver_id: receiverId, course_id: courseId, content });
        if (res.success) {
            document.getElementById('msgContent').value = '';
            document.getElementById('msgStudentSelect').value = '';
        }
        showAlert(res.message);
    });

    // 收件箱
    loadInbox(1);
    // 发件箱
    document.querySelector('a[href="#msgOutbox"]').addEventListener('click', () => loadOutbox(1));
}

async function loadInbox(page) {
    const res = await api.teacher.listReceivedMessages({ page, page_size: 10 });
    const div = document.getElementById('inboxList');
    if (!res.success || res.data.items.length === 0) {
        div.innerHTML = '<p class="text-muted">暂无收到消息</p>';
    } else {
        div.innerHTML = res.data.items.map(m => `
            <div class="border-bottom py-2 ${m.is_read ? '' : 'bg-light fw-bold'}">
                <div><small class="text-primary">来自: ${m.sender_name || m.sender_id}</small>
                    <small class="text-muted ms-3">${m.created_at || ''}</small>
                    ${!m.is_read ? `<button class="btn btn-sm btn-outline-secondary float-end" onclick="markRead(${m.id})">标为已读</button>` : ''}
                </div>
                <div class="mt-1">${m.content}</div>
                ${m.course_id ? `<small class="text-muted">课程ID: ${m.course_id}</small>` : ''}
            </div>
        `).join('');
    }
    renderPagination('inboxPagination', page, res.data.total, 10, loadInbox);
}

function markRead(msgId) {
    api.teacher.markRead(msgId).then(() => loadInbox(1));
}

async function loadOutbox(page) {
    const res = await api.teacher.listSentMessages({ page, page_size: 10 });
    const div = document.getElementById('outboxList');
    if (!res.success || res.data.items.length === 0) {
        div.innerHTML = '<p class="text-muted">暂无发送消息</p>';
    } else {
        div.innerHTML = res.data.items.map(m => `
            <div class="border-bottom py-2">
                <div><small class="text-success">发送给: ${m.receiver_name || m.receiver_id}</small>
                    <small class="text-muted ms-3">${m.created_at || ''}</small></div>
                <div class="mt-1">${m.content}</div>
                ${m.course_id ? `<small class="text-muted">课程ID: ${m.course_id}</small>` : ''}
            </div>
        `).join('');
    }
    renderPagination('outboxPagination', page, res.data.total, 10, loadOutbox);
}

function renderPagination(navId, page, total, pageSize, callback) {
    const nav = document.getElementById(navId);
    if (!nav) return;
    const totalPages = Math.ceil(total / pageSize);
    if (totalPages <= 1) { nav.innerHTML = ''; return; }
    let html = '<ul class="pagination pagination-sm">';
    html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}"><a class="page-link" href="#">上一页</a></li>`;
    for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#">${i}</a></li>`;
    }
    html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}"><a class="page-link" href="#">下一页</a></li>`;
    html += '</ul>';
    nav.innerHTML = html;
    nav.querySelectorAll('a.page-link').forEach(a => {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            const txt = this.textContent;
            if (txt === '上一页') callback(Math.max(1, page - 1));
            else if (txt === '下一页') callback(Math.min(totalPages, page + 1));
            else callback(parseInt(txt));
        });
    });
}
</script>
