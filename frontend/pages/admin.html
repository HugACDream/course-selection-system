<!-- ====== 通用模态框：表单编辑 ====== -->
<div class="modal fade" id="formModal" tabindex="-1">

</div>

<!-- ====== 确认删除模态框 ====== -->
<div class="modal fade" id="confirmModal" tabindex="-1">

                <p id="confirmMessage">确定要删除吗？</p>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ============================================================
// 系统管理员 - 页面主逻辑
// ============================================================

// ---- 页面路由 ----
let currentPage = 'dashboard';

document.getElementById('sidebarNav').addEventListener('click', function(e) {
    e.preventDefault();
    const link = e.target.closest('a');
    if (!link) return;
    const page = link.dataset.page;
    if (!page) return;

    // 更新侧边栏高亮
    document.querySelectorAll('#sidebarNav .nav-link').forEach(el => el.classList.remove('active'));
    link.classList.add('active');

    // 切换页面内容
    currentPage = page;
    renderPage(page);
});

// ---- 退出登录 ----
document.getElementById('btnLogout').addEventListener('click', async function(e) {
    e.preventDefault();
    // TODO: 调用 api.auth.logout() 清除session
    window.location.href = '/';
});

// ---- 页面渲染入口 ----
function renderPage(page) {
    const container = document.getElementById('mainContent');
    switch (page) {
        case 'dashboard':     renderDashboard(container); break;
        case 'students':      renderStudentList(container); break;
        case 'teachers':      renderTeacherList(container); break;
        case 'courses':       renderCourseList(container); break;
        case 'grades':        renderGradeList(container); break;
        case 'colleges':      renderCollegeList(container); break;
        case 'statistics':    renderStatistics(container); break;
    }
}

// ---- 初始化 ----
async function init() {
    // TODO: 检查登录状态 api.auth.currentUser()，未登录则跳转到 /
    renderPage('dashboard');
}
init();
