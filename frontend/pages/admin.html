<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理员 - 选课管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- ====== 侧边栏 ====== -->
        <nav class="col-md-2 d-md-block sidebar">
            <div class="text-center mb-4">
                <h5><i class="bi bi-building"></i> 选课管理系统</h5>
                <small class="text-muted">系统管理员</small>
            </div>
            <ul class="nav flex-column" id="sidebarNav">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-page="dashboard">
                        <i class="bi bi-speedometer2"></i> 控制台
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="students">
                        <i class="bi bi-people"></i> 学生管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="teachers">
                        <i class="bi bi-person-badge"></i> 教师管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="courses">
                        <i class="bi bi-book"></i> 课程管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="grades">
                        <i class="bi bi-bar-chart"></i> 成绩管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="colleges">
                        <i class="bi bi-diagram-3"></i> 学院管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-page="statistics">
                        <i class="bi bi-pie-chart"></i> 选课统计
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-danger" href="/" id="btnLogout">
                        <i class="bi bi-box-arrow-left"></i> 退出登录
                    </a>
                </li>
            </ul>
            <div class="mt-auto px-3 py-2">
                <small>当前用户: <span id="currentUserName">管理员</span></small>
            </div>
        </nav>

        <!-- ====== 主内容区 ====== -->
        <main class="col-md-10 main-content" id="mainContent">
            <!-- 内容由 JS 动态渲染 -->
        </main>
    </div>
</div>

<!-- ====== 通用模态框：表单编辑 ====== -->
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="formModalTitle">编辑</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="formModalBody">
                <!-- 表单内容由JS动态填充 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btnFormSave">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- ====== 确认删除模态框 ====== -->
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center py-4">
                <p id="confirmMessage">确定要删除吗？</p>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="btnConfirmDelete">确定删除</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
// ============================================================
// 系统管理员 - 页面主逻辑
// ============================================================

// ============================================================
// 页面路由
// ============================================================

let currentUser = null;

document.getElementById('sidebarNav').addEventListener('click', function(e) {
    e.preventDefault();
    const link = e.target.closest('a');
    if (!link) return;
    const page = link.dataset.page;
    if (!page) return;
    document.querySelectorAll('#sidebarNav .nav-link').forEach(el => el.classList.remove('active'));
    link.classList.add('active');
    currentPage = page;
    renderPage(page);
});

document.getElementById('btnLogout').addEventListener('click', async function(e) {
    e.preventDefault();
    await api.auth.logout();
    window.location.href = '/';
});

function renderPage(page) {
    const container = document.getElementById('mainContent');
    switch (page) {
        case 'dashboard':     renderDashboard(container); break;
        case 'students':      loadStudentList(container); break;
        case 'teachers':      loadTeacherList(container); break;
        case 'courses':       loadCourseList(container); break;
        case 'grades':        loadGradeList(container); break;
        case 'colleges':      loadCollegeList(container); break;
        case 'statistics':    loadStatistics(container); break;
    }
}

// ---- 工具函数 ----

function showAlert(message, type) {
    alert(message); // TODO: 后续可改为 Bootstrap toast
}

function renderPagination(containerId, page, total, pageSize, onPageChange) {
    const totalPages = Math.ceil(total / pageSize);
    if (totalPages <= 1) return '';
    let html = '<ul class="pagination pagination-sm">';
    for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}">
            <a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
    }
    html += '</ul>';
    const nav = document.getElementById(containerId);
    if (nav) {
        nav.innerHTML = html;
        nav.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                onPageChange(parseInt(this.dataset.page));
            });
        });
    }
}

// ---- 初始化 ----

async function init() {
    const result = await api.auth.currentUser();
    if (!result.success || !result.user) {
        window.location.href = '/';
        return;
    }
    currentUser = result.user;
    document.getElementById('currentUserName').textContent = currentUser.name;
    if (currentUser.role !== 'admin') {
        window.location.href = '/';
        return;
    }
    renderPage('dashboard');
}
init();


// ============================================================
// 1. 控制台
// ============================================================

async function renderDashboard(container) {
    container.innerHTML = `
        <h4 class="mb-4"><i class="bi bi-speedometer2"></i> 控制台</h4>
        <div class="row g-3 mb-4" id="dashboardStats">
            <div class="col-md-3"><div class="card card-stat"><div class="card-body">
                <h6>学生总数</h6><h3 id="statStudents">-</h3></div></div></div>
            <div class="col-md-3"><div class="card card-stat"><div class="card-body">
                <h6>教师总数</h6><h3 id="statTeachers">-</h3></div></div></div>
            <div class="col-md-3"><div class="card card-stat"><div class="card-body">
                <h6>课程总数</h6><h3 id="statCourses">-</h3></div></div></div>
            <div class="col-md-3"><div class="card card-stat"><div class="card-body">
                <h6>学院总数</h6><h3 id="statColleges">-</h3></div></div></div>
        </div>
    `;
    // 加载统计数据
    try {
        const [stuRes, teaRes, couRes, colRes] = await Promise.all([
            api.admin.listStudents({page_size: 1}),
            api.admin.listTeachers({page_size: 1}),
            api.admin.listCourses({page_size: 1}),
            api.admin.listColleges()
        ]);
        document.getElementById('statStudents').textContent = stuRes.success ? stuRes.data.total : '-';
        document.getElementById('statTeachers').textContent = teaRes.success ? teaRes.data.total : '-';
        document.getElementById('statCourses').textContent = couRes.success ? couRes.data.total : '-';
        document.getElementById('statColleges').textContent = colRes.success ? colRes.data.length : '-';
    } catch(e) {}
}


// ============================================================
// 2. 学生管理
// ============================================================

let studentPage = 1, studentPageSize = 20;

async function loadStudentList(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-people"></i> 学生管理</h4>
        <div class="card"><div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-3">
                    <input class="form-control" id="studentSearch" placeholder="搜索学号/姓名">
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="studentCollegeFilter">
                        <option value="">全部学院</option>
                    </select>
                </div>
                <div class="col-md-auto">
                    <button class="btn btn-outline-secondary" id="btnSearchStudent"><i class="bi bi-search"></i> 查询</button>
                </div>
                <div class="col-md-auto ms-auto">
                    <button class="btn btn-primary" id="btnAddStudent"><i class="bi bi-plus-circle"></i> 新增学生</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr><th>ID</th><th>学号</th><th>姓名</th><th>学院</th><th>邮箱</th><th>电话</th><th>操作</th></tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
            <nav id="studentPagination"></nav>
        </div></div>
    `;

    // 加载学院下拉
    const colRes = await api.admin.listColleges();
    if (colRes.success) {
        const sel = document.getElementById('studentCollegeFilter');
        colRes.data.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    }

    document.getElementById('btnSearchStudent').addEventListener('click', () => { studentPage = 1; refreshStudentTable(); });
    document.getElementById('btnAddStudent').addEventListener('click', showAddStudentForm);
    refreshStudentTable();
}

async function refreshStudentTable() {
    const keyword = document.getElementById('studentSearch').value.trim();
    const college_id = document.getElementById('studentCollegeFilter').value || null;
    const res = await api.admin.listStudents({ page: studentPage, page_size: studentPageSize, college_id, keyword });

    const tbody = document.getElementById('studentTableBody');
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>'; return; }

    const items = res.data.items;
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = items.map(u => `
            <tr>
                <td>${u.id}</td><td>${u.username}</td><td>${u.name}</td>
                <td>${u.college_id || '-'}</td><td>${u.email || '-'}</td><td>${u.phone || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditStudentForm(${u.id})">编辑</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="confirmDeleteStudent(${u.id},'${u.name}')">删除</button>
                </td>
            </tr>
        `).join('');
    }
    renderPagination('studentPagination', studentPage, res.data.total, studentPageSize, (p) => { studentPage = p; refreshStudentTable(); });
}

function showAddStudentForm() {
    document.getElementById('formModalTitle').textContent = '新增学生';
    document.getElementById('formModalBody').innerHTML = `
        <div class="mb-3"><label class="form-label">学号</label><input class="form-control" id="f_username"></div>
        <div class="mb-3"><label class="form-label">密码</label><input class="form-control" type="password" id="f_password"></div>
        <div class="mb-3"><label class="form-label">姓名</label><input class="form-control" id="f_name"></div>
        <div class="mb-3"><label class="form-label">学院ID</label><input class="form-control" id="f_college_id" placeholder="可选"></div>
        <div class="mb-3"><label class="form-label">邮箱</label><input class="form-control" id="f_email"></div>
        <div class="mb-3"><label class="form-label">电话</label><input class="form-control" id="f_phone"></div>
    `;
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    document.getElementById('btnFormSave').onclick = async function() {
        const data = {
            username: document.getElementById('f_username').value.trim(),
            password: document.getElementById('f_password').value.trim(),
            name: document.getElementById('f_name').value.trim(),
            college_id: parseInt(document.getElementById('f_college_id').value) || null,
            email: document.getElementById('f_email').value.trim(),
            phone: document.getElementById('f_phone').value.trim(),
        };
        const res = await api.admin.createStudent(data);
        if (res.success) { modal.hide(); refreshStudentTable(); }
        showAlert(res.message);
    };
    modal.show();
}

async function showEditStudentForm(id) {
    const res = await api.admin.getStudent(id);
    if (!res.success) { showAlert(res.message); return; }
    const u = res.user;
    document.getElementById('formModalTitle').textContent = '编辑学生';
    document.getElementById('formModalBody').innerHTML = `
        <div class="mb-3"><label class="form-label">姓名</label><input class="form-control" id="f_name" value="${u.name}"></div>
        <div class="mb-3"><label class="form-label">学院ID</label><input class="form-control" id="f_college_id" value="${u.college_id || ''}"></div>
        <div class="mb-3"><label class="form-label">邮箱</label><input class="form-control" id="f_email" value="${u.email || ''}"></div>
        <div class="mb-3"><label class="form-label">电话</label><input class="form-control" id="f_phone" value="${u.phone || ''}"></div>
    `;
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    document.getElementById('btnFormSave').onclick = async function() {
        const data = {
            name: document.getElementById('f_name').value.trim(),
            college_id: parseInt(document.getElementById('f_college_id').value) || null,
            email: document.getElementById('f_email').value.trim(),
            phone: document.getElementById('f_phone').value.trim(),
        };
        const result = await api.admin.updateStudent(id, data);
        if (result.success) { modal.hide(); refreshStudentTable(); }
        showAlert(result.message);
    };
    modal.show();
}

function confirmDeleteStudent(id, name) {
    document.getElementById('confirmMessage').textContent = `确定要删除学生"${name}"吗？`;
    const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
    document.getElementById('btnConfirmDelete').onclick = async function() {
        const res = await api.admin.deleteStudent(id);
        modal.hide();
        showAlert(res.message);
        if (res.success) refreshStudentTable();
    };
    modal.show();
}

// 3. 教师管理
// ============================================================

// ============================================================
// 4. 课程管理
// ============================================================

let coursePage = 1, coursePageSize = 20;

async function refreshCourseTable() {
    const college_id = document.getElementById('courseCollegeFilter').value || null;
    const res = await api.admin.listCourses({ page: coursePage, page_size: coursePageSize, college_id });
    const tbody = document.getElementById('courseTableBody');
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>'; return; }
    const items = res.data.items;
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = items.map(c => `
            <tr>
                <td>${c.id}</td><td>${c.name}</td><td>${c.credits}</td><td>${c.teacher_id || '-'}</td>
                <td>${c.college_id || '-'}</td><td>${c.max_students}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditCourseForm(${c.id})">编辑</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="confirmDeleteCourse(${c.id},'${c.name}')">删除</button>
                </td>
            </tr>
        `).join('');
    }
    renderPagination('coursePagination', coursePage, res.data.total, coursePageSize, (p) => { coursePage = p; refreshCourseTable(); });
}

function confirmDeleteCourse(id, name) {
    document.getElementById('confirmMessage').textContent = `确定要删除课程"${name}"吗？`;

    document.getElementById('btnConfirmDelete').onclick = async function() {
        const res = await api.admin.deleteCourse(id);
        modal.hide();
        showAlert(res.message);
        if (res.success) refreshCourseTable();
    };
    modal.show();
}

let gradePage = 1, gradePageSize = 20;

async function loadGradeList(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-bar-chart"></i> 成绩管理</h4>
        <div class="card"><div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-2"><input class="form-control" id="gradeStudentFilter" placeholder="学生ID"></div>
                <div class="col-md-2"><input class="form-control" id="gradeCourseFilter" placeholder="课程ID"></div>
                <div class="col-md-auto">
                    <button class="btn btn-outline-secondary" id="btnSearchGrade"><i class="bi bi-search"></i> 查询</button>
                </div>
                <div class="col-md-auto ms-auto">
                    <button class="btn btn-primary" id="btnAddGrade"><i class="bi bi-plus-circle"></i> 录入成绩</button>
                </div>
            </div>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr><th>ID</th><th>学生</th><th>课程</th><th>分数</th><th>绩点</th><th>操作</th></tr>
                </thead>
                <tbody id="gradeTableBody"></tbody>
            </table>
            <nav id="gradePagination"></nav>
        </div></div>
    `;

    document.getElementById('btnSearchGrade').addEventListener('click', () => { gradePage = 1; refreshGradeTable(); });
    document.getElementById('btnAddGrade').addEventListener('click', showAddGradeForm);
    refreshGradeTable();
}

async function refreshGradeTable() {
    const student_id = document.getElementById('gradeStudentFilter').value || null;
    const course_id = document.getElementById('gradeCourseFilter').value || null;
    const params = { page: gradePage, page_size: gradePageSize };
    if (student_id) params.student_id = student_id;
    if (course_id) params.course_id = course_id;
    const res = await api.admin.listGrades(params);
    const tbody = document.getElementById('gradeTableBody');
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">加载失败</td></tr>'; return; }
    const items = res.data.items;
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = items.map(g => `
            <tr>
                <td>${g.id}</td><td>${g.student_name || g.student_id}</td><td>${g.course_name || g.course_id}</td>
                <td>${g.score != null ? g.score : '-'}</td><td>${g.grade_point != null ? g.grade_point : '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditGradeForm(${g.id})">编辑</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="confirmDeleteGrade(${g.id})">删除</button>
                </td>
            </tr>
        `).join('');
    }
    renderPagination('gradePagination', gradePage, res.data.total, gradePageSize, (p) => { gradePage = p; refreshGradeTable(); });
}

function showAddGradeForm() {
    document.getElementById('formModalTitle').textContent = '录入成绩';
    document.getElementById('formModalBody').innerHTML = `
        <div class="mb-3"><label class="form-label">学生ID</label><input class="form-control" id="f_student_id"></div>
        <div class="mb-3"><label class="form-label">课程ID</label><input class="form-control" id="f_course_id"></div>
        <div class="mb-3"><label class="form-label">分数</label><input class="form-control" type="number" id="f_score"></div>
    `;
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    document.getElementById('btnFormSave').onclick = async function() {
        const data = {
            student_id: parseInt(document.getElementById('f_student_id').value),
            course_id: parseInt(document.getElementById('f_course_id').value),
            score: parseFloat(document.getElementById('f_score').value) || null,
        };
        const res = await api.admin.createGrade(data);
        if (res.success) { modal.hide(); refreshGradeTable(); }
        showAlert(res.message);
    };
    modal.show();
}

async function showEditGradeForm(id) {
    const params = { page: 1, page_size: 100 };
    const res = await api.admin.listGrades(params);
    if (!res.success) { showAlert('加载失败'); return; }
    const grade = res.data.items.find(g => g.id === id);
    if (!grade) { showAlert('成绩不存在'); return; }
    document.getElementById('formModalTitle').textContent = '编辑成绩';
    document.getElementById('formModalBody').innerHTML = `
        <div class="mb-3"><label class="form-label">分数</label><input class="form-control" type="number" id="f_score" value="${grade.score || ''}"></div>
    `;
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    document.getElementById('btnFormSave').onclick = async function() {
        const data = { score: parseFloat(document.getElementById('f_score').value) || null };
        const result = await api.admin.updateGrade(id, data);
        if (result.success) { modal.hide(); refreshGradeTable(); }
        showAlert(result.message);
    };
    modal.show();
}

function confirmDeleteGrade(id) {
    document.getElementById('confirmMessage').textContent = '确定要删除该成绩记录吗？';
    const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
    document.getElementById('btnConfirmDelete').onclick = async function() {
        const res = await api.admin.deleteGrade(id);
        modal.hide();
        showAlert(res.message);
        if (res.success) refreshGradeTable();
    };
    modal.show();
}

let statisticsChart = null;

async function loadStatistics(container) {
    container.innerHTML = `
        <h4 class="mb-3"><i class="bi bi-pie-chart"></i> 选课统计</h4>
        <div class="row">
            <div class="col-md-8">
                <div class="card"><div class="card-body">
                    <h5 class="card-title">各课程选课人数统计</h5>
                    <div style="height:400px;"><canvas id="statsChart"></canvas></div>
                </div></div>
            </div>
            <div class="col-md-4">
                <div class="card"><div class="card-body">
                    <h5 class="card-title">数据明细</h5>
                    <button class="btn btn-outline-success btn-sm mb-2" id="btnExportStats"><i class="bi bi-download"></i> 导出</button>
                    <table class="table table-sm">
                        <thead><tr><th>课程</th><th>选课人数</th></tr></thead>
                        <tbody id="statsTableBody"></tbody>
                    </table>
                </div></div>
            </div>
        </div>
    `;

    const res = await api.admin.getCourseSelectionStats();
    if (!res.success) {
        document.getElementById('statsTableBody').innerHTML = '<tr><td colspan="2" class="text-center text-danger">加载失败</td></tr>';
        return;
    }

    const data = res.data;
    const tbody = document.getElementById('statsTableBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = data.map(d =>
            `<tr><td>${d.course_name}</td><td>${d.count}</td></tr>`
        ).join('');
    }

    // 柱状图
    const ctx = document.getElementById('statsChart').getContext('2d');
    if (statisticsChart) statisticsChart.destroy();
    statisticsChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.map(d => d.course_name),
            datasets: [{
                label: '选课人数',
                data: data.map(d => d.count),
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: { responsive: true, maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
    });

    document.getElementById('btnExportStats').addEventListener('click', () => {
        showAlert('导出功能待实现');
    });
}
</script>
