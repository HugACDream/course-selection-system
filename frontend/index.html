<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container">
    <div class="login-container bg-white">
        <h3 class="text-center mb-3">选课管理系统</h3>
        <p class="text-center text-muted mb-4">系统管理员 / 学院管理员 / 教师 / 学生</p>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" required placeholder="请输入用户名">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" required placeholder="请输入密码">
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">角色</label>
                <select class="form-select" id="role">
                    <option value="admin">系统管理员</option>
                    <option value="college_admin">学院管理员</option>
                    <option value="teacher">教师</option>
                    <option value="student">学生</option>
                </select>
            </div>
            <div id="loginError" class="alert alert-danger d-none"></div>
            <button type="submit" class="btn btn-primary w-100">登 录</button>
        </form>

        <div class="mt-3 text-center text-muted small">
            <p class="mb-1">演示账号：admin / admin123</p>
            <p class="mb-0">各角色登录后跳转到对应管理界面</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
// ============================================================
// 登录页逻辑
// ============================================================

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const role = document.getElementById('role').value;
    const errorDiv = document.getElementById('loginError');

    const result = await api.auth.login(username, password);

    if (result.success) {
        const role = result.user.role;
        const pageMap = {
            'admin': '/pages/admin.html',
            'college_admin': '/pages/college_admin.html',
            'teacher': '/pages/teacher.html',
            'student': '/pages/student.html',
        };
        window.location.href = pageMap[role] || '/';
    } else {
        errorDiv.classList.remove('d-none');
        errorDiv.textContent = result.message || '登录失败';
    }

});
</script>

</body>
</html>
